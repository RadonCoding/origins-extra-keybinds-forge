name: Release

on:
  push:
    branches:
      - 1.20.1
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Run build
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Find jar
        id: jar
        run: echo "path=$(find build/libs -name '*.jar')" >> $GITHUB_OUTPUT
        
      - name: Publish to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_API_TOKEN }}
          project_id: 758302
          game_endpoint: minecraft
          file_path: ${{ steps.jar.outputs.path }}
          game_versions: Minecraft 1.20:1.20.1,Java 17,Forge
          release_type: release
