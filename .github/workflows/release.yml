name: Release

on:
  push:
    branches:
      - '1.*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Run build
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Read gradle.properties
        id: props
        run: echo "minecraft_version=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)" >> $GITHUB_OUTPUT
        
      - name: Publish to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_API_TOKEN }}
          project_id: 758302
          game_endpoint: minecraft
          file_path: build/libs/*.jar
          changelog: ${{ github.event.head_commit.message }}
          game_versions: ${{ steps.props.outputs.minecraft_version }},Java 17
          release_type: release
