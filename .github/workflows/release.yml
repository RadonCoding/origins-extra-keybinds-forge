name: Release
on:
  push:
    branches:
      - 1.18.2
  workflow_dispatch:
  
jobs:
  configure:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.flags.outputs.deploy }}
    steps:
      - id: flags
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ contains(join(github.event.commits.*.message), '#skip') }}" == "false" ]]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi
          
  release:
    if: ${{ needs.configure.outputs.deploy == 'true' }}
    needs: configure
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Run build
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon
          
      - name: Find jar
        id: jar
        run: echo "path=$(find build/libs -name '*.jar')" >> $GITHUB_OUTPUT

      - name: Read gradle.properties
        id: props
        run: |
          mod_name=$(grep '^mod_name=' gradle.properties | cut -d'=' -f2-)
          mod_version=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2-)
          minecraft_version=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2-)
          echo "name=$mod_name $minecraft_version-$mod_version" >> $GITHUB_OUTPUT
          echo "version=$minecraft_version-$mod_version" >> $GITHUB_OUTPUT
        
      - name: Publish to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_API_TOKEN }}
          project_id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          game_endpoint: minecraft
          file_path: ${{ steps.jar.outputs.path }}
          game_versions: Minecraft 1.18:1.18.2,Forge,environment:Client
          release_type: release
          relations: "origins-forge:requiredDependency"

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          files: ${{ steps.jar.outputs.path }}
          name: ${{ steps.props.outputs.name }}
          version: ${{ steps.props.outputs.version }}
          game-versions: 1.18.2
          loaders: forge
          version-type: release
          dependencies: |
            origins-forge

      - name: Patch Modrinth environment
        run: |
          version=$(curl -s "https://api.modrinth.com/v3/project/${{ vars.MODRINTH_PROJECT_ID }}/version?include_changelog=false" \
            -H "Authorization: ${{ secrets.MODRINTH_API_TOKEN }}" | \
            jq -r 'sort_by(.date_published) | last | .id')
          curl -X PATCH "https://api.modrinth.com/v3/version/$version" \
            -H "Authorization: ${{ secrets.MODRINTH_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"environment":"client_only"}'