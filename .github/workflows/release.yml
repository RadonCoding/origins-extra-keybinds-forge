name: Release
on:
  push:
    branches:
      - 1.19.2
  workflow_dispatch:
  
jobs:
  configure:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.flags.outputs.deploy }}
    steps:
      - id: flags
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ contains(join(github.event.commits.*.message), '#skip') }}" == "false" ]]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi
          
  release:
    if: ${{ needs.configure.outputs.deploy == 'true' }}
    needs: configure
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Run build
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon
          
      - name: Find jar
        id: jar
        run: echo "path=$(find build/libs -name '*.jar')" >> $GITHUB_OUTPUT
        
      - name: Publish to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_API_TOKEN }}
          project_id: 758302
          game_endpoint: minecraft
          file_path: ${{ steps.jar.outputs.path }}
          game_versions: Minecraft 1.19:1.19.2,Forge,environment:Client
          release_type: release
          relations: "origins-forge:requiredDependency"
